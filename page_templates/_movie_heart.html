<form method="post" action="{{ url_for('toggle_movie_like', movie_id=movie_id) }}" class="movie-like-form">
  <input type="hidden" name="next" value="{{ request.full_path }}">
  <button type="submit" class="movie-like-btn {% if movie_id in liked_movie_ids %}liked{% endif %}" aria-label="Toggle like">
    <svg viewBox="0 0 24 24" class="heart-icon" aria-hidden="true">
      <path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"></path>
    </svg>
  </button>
</form>
