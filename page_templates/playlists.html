{% extends 'base.html' %}
{% block title %}CineMuse | Playlists{% endblock %}
{% block content %}
<div class="grid two">
  <section class="panel">
    <h1 class="create-playlist-title-center">Create Playlist</h1>
    <form method="post" class="form">
      <input type="hidden" name="action" value="create">
      <input name="playlist_name" placeholder="Playlist name" required>
      <button class="btn" type="submit">Create</button>
    </form>
  </section>

  <section class="panel">
    <h2>Your Playlists</h2>
    {% for p in playlists %}
      <article class="card">
        <p><strong><a class="link" href="{{ url_for('playlist_detail', playlist_id=p.playlist_id) }}">{{ p.playlist_name }}</a></strong> · {{ p.movie_count }} movies</p>
      </article>
    {% else %}
      <p>No playlists yet.</p>
    {% endfor %}

  </section>
</div>
{% endblock %}
