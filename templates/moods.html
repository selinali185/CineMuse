{% extends 'base.html' %}
{% block title %}CineMuse | Moods{% endblock %}
{% block content %}
<section class="panel">
  <h1>Genre Discovery</h1>
  <div class="grid mood-grid">
    {% for genre in moods %}
      <a class="card mood" href="{{ url_for('recommendations', genre=genre) }}">
        <strong>{{ genre }}</strong>
        <p>{{ genre }} movies</p>
      </a>
    {% endfor %}
  </div>
</section>
{% endblock %}
